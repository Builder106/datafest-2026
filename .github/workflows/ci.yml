name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax:
    name: R + shell syntax
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'
          use-public-rspm: true

      - name: Parse all R scripts
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r f; do
            echo "::group::parse $f"
            if ! Rscript -e "parse(file = commandArgs(TRUE)[1])" "$f"; then
              echo "::error file=$f::R parse error"
              fail=1
            fi
            echo "::endgroup::"
          done < <(find analysis -type f -name '*.R')
          exit "$fail"

      - name: Shellcheck shell scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: analysis/sh
          severity: warning

  test:
    name: Unit tests
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'
          use-public-rspm: true

      - name: Install test dependencies
        shell: Rscript {0}
        run: |
          options(repos = c(CRAN = "https://packagemanager.posit.co/cran/__linux__/jammy/latest"))
          install.packages(c("testthat", "data.table", "DBI", "duckdb"))

      - name: Run unit tests
        shell: Rscript {0}
        run: |
          testthat::test_dir("analysis/tests",
                             reporter  = "progress",
                             stop_on_failure = TRUE)

  # NOTE: there is deliberately no CI "smoke test" job. analysis/output/{figures,
  # tables} are gitignored generated artifacts, so they don't exist on a fresh CI
  # checkout — a smoke test that asserts they're present can only fail there.
  # analysis/tests/smoke_test_outputs.R is a LOCAL post-pipeline check; the
  # portable ROOT resolution (2026-06-13) makes it runnable from anywhere after
  # the pipeline has generated outputs.

  playwright:
    name: E2E tests (Playwright BDD)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 26
          cache: npm

      - name: Install deps
        run: (npm ci --no-audit --no-fund) || (npm install --no-audit --no-fund)

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate Gherkin specs
        run: npx bddgen

      - name: Run Playwright
        run: npx playwright test

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
