name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax:
    name: R + shell syntax
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'
          use-public-rspm: true

      - name: Parse all R scripts
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r f; do
            echo "::group::parse $f"
            if ! Rscript -e "parse(file = commandArgs(TRUE)[1])" "$f"; then
              echo "::error file=$f::R parse error"
              fail=1
            fi
            echo "::endgroup::"
          done < <(find analysis -type f -name '*.R')
          exit "$fail"

      - name: Shellcheck shell scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: analysis/sh
          severity: warning

  smoke:
    name: Output smoke test
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'
          use-public-rspm: true

      - name: Install runtime deps
        run: Rscript -e 'install.packages("data.table")'

      # Validates the committed analysis outputs (figures + tables) still exist
      # and carry sane headline values. ROOT auto-resolves to the repo checkout.
      - name: Run output smoke test
        run: Rscript analysis/tests/smoke_test_outputs.R
