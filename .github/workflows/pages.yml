name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'assets/banner-*'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    name: Build and deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Stage site
        run: |
          set -euo pipefail
          mkdir -p _site
          cp -r docs/. _site/
          mkdir -p _site/assets
          cp assets/banner-dark.svg assets/banner-light.svg _site/assets/
          cp assets/banner-dark.png assets/banner-light.png _site/assets/
          cp assets/social-card.png assets/social-card.svg _site/assets/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
