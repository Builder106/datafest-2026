<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0c1525"/>
  <rect x="0" y="0" width="6" height="630" fill="#4dd0e1"/>

  <text x="80" y="98" font-family="Helvetica, Arial, sans-serif" font-size="15" letter-spacing="3.2" fill="#7a8aa6" font-weight="700">WESLEYAN DATAFEST 2026 &#183; TEAM 13</text>

  <text x="80" y="218" font-family="Helvetica, Arial, sans-serif" font-size="64" font-weight="700" fill="#ffffff" letter-spacing="-0.01em">When a Ride Is</text>
  <text x="80" y="290" font-family="Helvetica, Arial, sans-serif" font-size="64" font-weight="700" fill="#ffffff" letter-spacing="-0.01em">the Missing Treatment</text>

  <text x="80" y="362" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#a8b6cc">Transportation barriers in Stormont Vail Health EHR data</text>
  <text x="80" y="394" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#a8b6cc">show <tspan fill="#ff7676" font-weight="700">3&#215; higher</tspan> emergency-department utilization.</text>

  <g transform="translate(80, 470)" font-family="Helvetica, Arial, sans-serif">
    <g>
      <text font-size="56" font-weight="700" fill="#ff7676" x="0" y="0" letter-spacing="-0.02em">3.17</text>
      <text font-size="11" letter-spacing="1.6" font-weight="700" fill="#9aa9c4" x="0" y="22">ADJUSTED OR</text>
      <text font-size="11" letter-spacing="1.6" fill="#5e6e8e" x="0" y="42">95% CI 2.93&#8211;3.43</text>
    </g>
    <g transform="translate(220, 0)">
      <text font-size="56" font-weight="700" fill="#ffffff" x="0" y="0" letter-spacing="-0.02em">1.94</text>
      <text font-size="11" letter-spacing="1.6" font-weight="700" fill="#9aa9c4" x="0" y="22">ED VISITS / PY</text>
      <text font-size="11" letter-spacing="1.6" fill="#5e6e8e" x="0" y="42">vs 0.48 with no barrier</text>
    </g>
    <g transform="translate(440, 0)">
      <text font-size="56" font-weight="700" fill="#ffffff" x="0" y="0" letter-spacing="-0.02em">7.6M</text>
      <text font-size="11" letter-spacing="1.6" font-weight="700" fill="#9aa9c4" x="0" y="22">ENCOUNTERS</text>
      <text font-size="11" letter-spacing="1.6" fill="#5e6e8e" x="0" y="42">947K patients, 2022&#8211;2025</text>
    </g>
    <g transform="translate(660, 0)">
      <text font-size="56" font-weight="700" fill="#ffffff" x="0" y="0" letter-spacing="-0.02em">68%</text>
      <text font-size="11" letter-spacing="1.6" font-weight="700" fill="#9aa9c4" x="0" y="22">ANY ED VISIT</text>
      <text font-size="11" letter-spacing="1.6" fill="#5e6e8e" x="0" y="42">vs 43% with no barrier</text>
    </g>
  </g>

  <line x1="80" y1="558" x2="1120" y2="558" stroke="#2a3a5c" stroke-width="1"/>

  <text x="80" y="592" font-family="Helvetica, Arial, sans-serif" font-size="14" letter-spacing="0.4" fill="#4dd0e1" font-weight="600">yinkavaughan.me/datafest-2026</text>
  <text x="1120" y="592" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" letter-spacing="1" fill="#5e6e8e" font-weight="500">github.com/Builder106/datafest-2026</text>
