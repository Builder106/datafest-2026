<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0a0e1f"/>
  <rect x="0" y="0" width="6" height="630" fill="#60a5fa"/>

  <text x="80" y="98" font-family="Helvetica, Arial, sans-serif" font-size="15" letter-spacing="3.2" fill="#5d6585" font-weight="700">WESLEYAN DATAFEST 2026 &#183; TEAM 13</text>

  <text x="80" y="218" font-family="Helvetica, Arial, sans-serif" font-size="64" font-weight="700" fill="#f8f9fc" letter-spacing="-0.01em">When a Ride Is</text>
  <text x="80" y="290" font-family="Helvetica, Arial, sans-serif" font-size="64" font-weight="700" fill="#f8f9fc" letter-spacing="-0.01em">the Missing Treatment</text>

  <text x="80" y="362" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#9da4be">Transportation barriers in Stormont Vail Health EHR data</text>
  <text x="80" y="394" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#9da4be">show <tspan fill="#f87171" font-weight="700">3&#215; higher</tspan> emergency-department utilization.</text>

  <g transform="translate(80, 470)" font-family="Helvetica, Arial, sans-serif">
    <g>
      <text font-size="56" font-weight="700" fill="#f87171" x="0" y="0" letter-spacing="-0.02em">3.17</text>
      <text font-size="11" letter-spacing="1.6" font-weight="700" fill="#9da4be" x="0" y="22">ADJUSTED OR</text>
      <text font-size="11" letter-spacing="1.6" fill="#5d6585" x="0" y="42">95% CI 2.93&#8211;3.43</text>
    </g>
    <g transform="translate(220, 0)">
      <text font-size="56" font-weight="700" fill="#f8f9fc" x="0" y="0" letter-spacing="-0.02em">1.94</text>
      <text font-size="11" letter-spacing="1.6" font-weight="700" fill="#9da4be" x="0" y="22">ED VISITS / PY</text>
      <text font-size="11" letter-spacing="1.6" fill="#5d6585" x="0" y="42">vs 0.48 with no barrier</text>
    </g>
    <g transform="translate(440, 0)">
      <text font-size="56" font-weight="700" fill="#f8f9fc" x="0" y="0" letter-spacing="-0.02em">7.6M</text>
      <text font-size="11" letter-spacing="1.6" font-weight="700" fill="#9da4be" x="0" y="22">ENCOUNTERS</text>
      <text font-size="11" letter-spacing="1.6" fill="#5d6585" x="0" y="42">947K patients, 2022&#8211;2025</text>
