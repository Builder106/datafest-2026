    <g transform="translate(660, 0)">
      <text font-size="56" font-weight="700" fill="#f8f9fc" x="0" y="0" letter-spacing="-0.02em">68%</text>
      <text font-size="11" letter-spacing="1.6" font-weight="700" fill="#9da4be" x="0" y="22">ANY ED VISIT</text>
      <text font-size="11" letter-spacing="1.6" fill="#5d6585" x="0" y="42">vs 43% with no barrier</text>
